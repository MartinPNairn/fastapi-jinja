services:

  app:
    build: .
    ports:
      - "8000:80"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_database
 
  redis:
    image: redis:8
