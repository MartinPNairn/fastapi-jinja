{% extends "base.html" %}

{% block title %} Register {% endblock %}

{% block content %}

<div class="container">
    <div class="card">
        <div class="card-header">
            Register
        </div>
        <div class="card-body">
            <form id="registerForm" method="post">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Email</label>
                        <input class="form-control" name="email" required type="text">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Username</label>
                        <input class="form-control" name="username" required type="text">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>First Name</label>
                        <input class="form-control" name="firstname" required type="text">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Last Name</label>
                        <input class="form-control" name="lastname" required type="text">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Role</label>
                        <input class="form-control" name="role" required type="text">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Phone Number</label>
                        <input class="form-control" name="phone_number" required type="text">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input class="form-control" name="password" required type="password">
                </div>
                <div class="form-group">
                    <label>Verify Password</label>
                    <input class="form-control" name="password2" required type="password">
                </div>
                <button class="btn btn-primary" type="submit">Sign Up</button>
            </form>
        </div>
        <div class="card-footer text-muted">
            <a href="/auth/login-page">Already have an account?</a>
        </div>
    </div>
</div>


{% endblock %}
