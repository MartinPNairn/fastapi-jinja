{% extends "base.html" %}

{% block title %} Log In {% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header">
            Login
        </div>
        <div class="card-body">
            <form id="loginForm" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input autocomplete="username" class="form-control" name="username" required type="text">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input autocomplete="current-password" class="form-control" name="password" required
                           type="password">
                </div>
                <button class="btn btn-primary" type="submit">Submit</button>
            </form>
        </div>
        <div class="card-footer text-muted">
            <a href="/auth/register-page">Register?</a>
        </div>
    </div>
</div>
{% endblock %}
